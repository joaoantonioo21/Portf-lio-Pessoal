
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Pessoal</title>

    <style>
        body {
            background: linear-gradient(135deg, #f5f5dc, #fceabb);
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 6px 18px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .card {
            background-color: #fafafa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #34495e;
            margin-top: 0;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 8px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 12px 0;
            font-size: 17px;
        }

        a {
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #1abc9c;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>João Antônio Wilamoski Elias</h1>

        <section class="card">
            <h2>📞 Contato</h2>

            <ul>
                <li>
                    📧
                    <a target="_blank" href="mailto:joao.elias@unifebe.edu.br">
                        joao.elias@unifebe.edu.br
                    </a>
                </li>

                <li>📱 (47) 9976-2777</li>
            </ul>
        </section>

        <section class="card">
            <h2>🎓 Formação</h2>

            <ul>
                <li>🏫 Ensino médio completo (Colégio São Luiz).</li>
                <li>💻 Atualmente cursando Sistemas de Informação (UNIFEBE).</li>
            </ul>
        </section>

        <footer>
            Desenvolvido por João Antônio
        </footer>

    </div>

</body>

</html>
